# env_configs/push_bottle.yaml

env:
  _target_: capx.envs.tasks.franka.push_bottle_task.FrankaPushBottleTaskEnv
  cfg:
    _target_: capx.envs.tasks.base.CodeExecEnvConfig
    low_level: push_bottle_sim_env
    privileged: false
    apis:
      - FrankaControlApi
    prompt: |
      {
      You are controlling a Franka Emika robot with API described below.

      [1. SCENE DESCRIPTION: The scene consists of a tabletop workspace with a green plastic bottle standing upright on it. The reference coordinate system defines +z as pointing vertically upwards from the table surface.]

      [2. STATE CHANGE & GOAL REASONING: Across the sequence of keyframes, the table remains unchanged. The green bottle transitions from a stable, upright position to being knocked over and sliding horizontally. The fundamental task is to topple or knock over the standing bottle.]

      [3. CONSTRAINT & GRASP REASONING: 
      # - Relational Constraints: The bottle is resting on the table surface.
      # - Safety & Collision: The robot must avoid colliding with the table; z-coordinates for all end-effector movements must remain safely above the table surface (z > 0).
      # - Grasping/Approaching: Grasping the object is not necessary. The robot should use a closed gripper as a pushing tool. To effectively topple the bottle rather than just pushing it along the table, the contact point should be on the upper half of the bottle (above its center of mass). The approach vector should be horizontal, sweeping across the bottle's position.]

      [4. SUGGESTED METHODS: 
      # 1. Close the gripper to prepare it as a striking tool.
      # 2. Get the pose and bounding box extent of the green bottle.
      # 3. Calculate a strike height targeting the upper portion of the bottle (e.g., bottle_pose center z + bottle_extent z / 4).
      # 4. Calculate an approach waypoint to the side of the bottle (e.g., offset by -0.15m along the y-axis) at the calculated strike height.
      # 5. Move the robot end effector to the approach waypoint.
      # 6. Calculate a target waypoint on the opposite side of the bottle (e.g., offset by +0.15m along the y-axis) at the same strike height.
      # 7. Move linearly to the target waypoint, sweeping through the bottle's space to knock it over.
      ]

      You may write python code comments for reasoning but ONLY write the executable Python code and do not write it in code fences.
      The functions (APIs) below are already imported to the environment. If you want to use numpy, you need to import it explicitly.
      }
# 让框架自动拉起视觉和运动规划服务器 (这样你就不用手动开多余的 terminal 了)
api_servers:
  - _target_: capx.serving.launch_sam3_server.main
    device: cuda
    port: 8114
    host: 127.0.0.1
  - _target_: capx.serving.launch_contact_graspnet_server.main
    port: 8115
    host: 127.0.0.1
  - _target_: capx.serving.launch_pyroki_server.main
    port: 8116
    host: 127.0.0.1
    robot: panda_description
    target_link: panda_hand

record_video: true
output_dir: ./outputs/push_bottle_pipeline
trials: 10
num_workers: 1